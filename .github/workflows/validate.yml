name: validate

# The Worker deploys via Cloudflare's git integration on every push — there is no deploy
# step here. This workflow is the pre-flight net: it catches a broken wrangler.jsonc, or a
# deploy commit (from Axis's deploy-remote Action) that accidentally wiped the generated SPA,
# BEFORE Cloudflare picks up the push and fails silently / serves a broken site.
on: [push, pull_request]

jobs:
  validate:
    name: SPA present + wrangler config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: SPA assets present
        # public/ is GENERATED by Axis's deploy-remote Action — never hand-edited. If these
        # are missing, a bad deploy commit clobbered the SPA; fail loudly instead of shipping.
        run: |
          fail=0
          for f in public/index.html public/welcome.html; do
            if [ ! -f "$f" ]; then
              echo "::error::$f is missing — public/ is GENERATED by Axis's deploy-remote Action (never hand-edited). A deploy commit likely wiped the SPA."
              fail=1
            fi
          done
          if [ ! -d public/_app ] || [ -z "$(ls -A public/_app 2>/dev/null)" ]; then
            echo "::error::public/_app/ is missing or empty — public/ is GENERATED by Axis's deploy-remote Action (never hand-edited). A deploy commit likely wiped the SPA."
            fail=1
          fi
          exit $fail
      - name: wrangler config validates
        # Dry-run compiles the Worker + validates wrangler.jsonc without any Cloudflare auth.
        env:
          WRANGLER_SEND_METRICS: "false"
        run: npx --yes wrangler@4 deploy --dry-run
